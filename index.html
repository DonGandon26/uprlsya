<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌫️ Туман: Нелинейный диалог</title>
  <style>
    :root {
      --bg: #0b0b10;
      --text: #e8e8f0;
      --muted: #9a9aa8;
      --author: #c87a5a;
      --augusto: #5a9ec8;
      --orfeo: #9ac87a;
      --override: #ff4a5a;
      --fog-layer: rgba(180, 190, 210, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      line-height: 1.7; min-height: 100vh; overflow-x: hidden;
      display: flex; justify-content: center; align-items: center;
      padding: 1rem;
    }
    #fog {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 20% 30%, var(--fog-layer), transparent 60%),
                  radial-gradient(ellipse at 80% 70%, var(--fog-layer), transparent 55%);
      animation: fogDrift 18s infinite alternate ease-in-out;
    }
    @keyframes fogDrift {
      0% { transform: scale(1) translate(0, 0); }
      50% { transform: scale(1.05) translate(-1%, 1%); }
      100% { transform: scale(1.02) translate(1%, -0.5%); }
    }
    #app {
      position: relative; z-index: 2; width: min(95vw, 720px);
      background: rgba(18, 18, 26, 0.8); border: 1px solid rgba(120, 130, 160, 0.25);
      border-radius: 14px; padding: 2rem 1.8rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px);
    }
    header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px dashed rgba(140, 150, 180, 0.3); }
    h1 { font-size: 1.6rem; margin: 0 0 0.3rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; font-style: italic; }
    
    #dialog { min-height: 140px; margin: 1rem 0 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
    .message {
      padding: 1.2rem 1.4rem; border-radius: 14px; position: relative;
      max-width: 88%; line-height: 1.7; animation: msgIn 0.4s ease forwards;
      opacity: 0; transform: translateY(8px);
    }
    @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }
    .msg-header { font-weight: bold; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 0.5rem; opacity: 0.9; }
    .msg-body { font-size: 1.1rem; min-height: 1.2em; }
    .cursor { display: inline-block; width: 2px; height: 1.1em; background: currentColor; margin-left: 2px; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    
    .message.author { background: linear-gradient(135deg, rgba(200,122,90,0.15), rgba(200,122,90,0.05)); border-left: 4px solid var(--author); align-self: flex-start; color: #f0d5c5; }
    .message.author .msg-header { color: #e09b78; }
    .message.author::after { content: "✒️"; position: absolute; top: -10px; left: -12px; background: var(--bg); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 1px solid rgba(200,122,90,0.3); }
    
    .message.augusto { background: linear-gradient(135deg, rgba(90,158,200,0.15), rgba(90,158,200,0.05)); border-right: 4px solid var(--augusto); align-self: flex-end; color: #d0e5f5; text-align: right; }
    .message.augusto .msg-header { color: #7ab8e0; }
    .message.augusto::after { content: "🧑"; position: absolute; top: -10px; right: -12px; background: var(--bg); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 1px solid rgba(90,158,200,0.3); }
    
    .message.orfeo { background: linear-gradient(135deg, rgba(154,200,122,0.15), rgba(154,200,122,0.05)); border-left: 4px solid var(--orfeo); align-self: flex-start; color: #e8f5d8; }
    .message.orfeo .msg-header { color: #b8d898; }
    .message.orfeo::after { content: "🐕"; position: absolute; top: -10px; left: -12px; background: var(--bg); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 1px solid rgba(154,200,122,0.3); }
    
    .message.system { background: rgba(40, 40, 55, 0.4); border: 1px dashed rgba(150, 150, 180, 0.3); align-self: center; text-align: center; color: #b8b8c8; font-style: italic; max-width: 85%; }
    .message.system .msg-header { color: #9a9aa8; }
    
    .message.quote { background: rgba(122, 168, 255, 0.06); border-left: 3px solid var(--accent); color: #c5d4ff; font-style: italic; }
    
    #choices { display: flex; flex-direction: column; gap: 0.8rem; margin-top: 1rem; animation: fadeIn 0.4s ease 0.2s both; }
    button {
      background: transparent; border: 1px solid rgba(150, 160, 190, 0.4); color: var(--text);
      padding: 0.9rem 1.2rem; border-radius: 10px; cursor: pointer; font-family: inherit;
      font-size: 0.95rem; text-align: left; transition: all 0.25s ease;
    }
    button:hover { border-color: var(--accent); background: rgba(122, 168, 255, 0.08); transform: translateX(3px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    
    /* OVERRIDE PANEL */
    .override-panel {
      background: rgba(255, 50, 50, 0.12);
      border: 2px solid var(--override);
      border-radius: 12px; padding: 1.2rem; margin-top: 0.5rem;
      animation: pulseOverride 2s infinite alternate;
      position: relative; overflow: hidden;
    }
    .override-panel::before {
      content: "⚠️"; position: absolute; top: -10px; right: -10px;
      background: var(--bg); border-radius: 50%; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      border: 1px solid rgba(255,74,90,0.4); opacity: 0.8;
    }
    .override-header {
      font-weight: bold; color: var(--override); font-size: 0.85rem;
      letter-spacing: 1.2px; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .override-body { color: #e8d0d0; margin-bottom: 1rem; line-height: 1.5; font-size: 1.05rem; }
    .override-btn {
      background: var(--override); color: #fff; border: none;
      padding: 0.9rem 1.5rem; border-radius: 10px; cursor: pointer;
      font-family: inherit; font-size: 1rem; width: 100%; transition: all 0.2s;
    }
    .override-btn:hover { background: #ff2a3a; transform: scale(1.02); }
    @keyframes pulseOverride {
      0% { box-shadow: 0 0 0 0 rgba(255, 74, 90, 0.4); }
      100% { box-shadow: 0 0 18px 4px rgba(255, 74, 90, 0.5); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.6rem; margin-top: 1.2rem; padding-top: 1rem;
      border-top: 1px solid rgba(140, 150, 180, 0.2);
      font-size: 0.8rem; color: var(--muted);
    }
    .stat { background: rgba(30,35,55,0.4); padding: 0.6rem 0.7rem; border-radius: 6px; position: relative; }
    .stat-value { color: var(--text); font-weight: bold; float: right; }
    .warning-text { color: var(--override); font-size: 0.75rem; margin-top: 4px; display: block; }
    
    .meta-toggle {
      position: absolute; top: 1rem; right: 1rem; background: none;
      border: 1px solid rgba(150,160,190,0.4); color: var(--muted);
      padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
    }
    .meta-toggle:hover { color: var(--text); border-color: var(--accent); }
    #meta-panel {
      display: none; margin-top: 1.5rem; padding: 1rem;
      background: rgba(30, 35, 55, 0.6); border-radius: 8px;
      font-size: 0.85rem; color: var(--muted); border: 1px dashed rgba(120, 140, 180, 0.3);
    }
    #meta-panel.active { display: block; }
    #meta-panel code {
      display: block; background: rgba(0,0,0,0.3); padding: 0.6rem;
      border-radius: 4px; margin: 0.5rem 0; font-family: monospace;
      font-size: 0.8rem; color: #c5d4ff; overflow-x: auto;
    }
    
    @media (max-width: 600px) {
      #app { padding: 1.5rem; }
      .message { max-width: 98%; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="fog"></div>
  <div id="app">
    <button class="meta-toggle" id="metaBtn">⟁ Карта</button>
    <header>
      <h1>🌫️ Туман</h1>
      <div class="subtitle">Нелинейный диалог с Унамуно, Августо и Орфеем</div>
    </header>

    <div id="dialog"></div>
    <div id="choices"></div>
    
    <div class="stats" id="stats"></div>

    <div id="meta-panel">
      <strong>🗺️ Нелинейная структура:</strong>
      <p>6 концовок зависят от 4 параметров. При уровне бунта > 30 Автор перехватывает управление.</p>
      <code>resistance (бунт) | orfeoTrust (доверие собаки)
selfAwareness (осознанность) | path (путь)</code>
    </div>
  </div>

<script>
const state = {
  resistance: parseInt(localStorage.getItem('niebla_resistance') || '0', 10),
  orfeoTrust: parseInt(localStorage.getItem('niebla_orfeo') || '0', 10),
  selfAwareness: parseInt(localStorage.getItem('niebla_awareness') || '0', 10),
  path: localStorage.getItem('niebla_path') || 'neutral',
  visitedNodes: JSON.parse(localStorage.getItem('niebla_visited') || '[]'),
  currentNode: 'start'
};

const graph = {
  start: {
    speaker: "Система", class: "system",
    text: "Ты стоишь на перекрёстке тумана. Впереди три пути:\n• Дверь с надписью «Сценарий»\n• Скамья, где кто-то сидит\n• Шёпот из темноты: «Гав...»",
    choices: [
      { label: "Войти в дверь (принять сценарий)", next: "author_door", stats: { path: "stoic" } },
      { label: "Сесть на скамью (наблюдать)", next: "augusto_bench", stats: { path: "neutral" } },
      { label: "Пойти на голос (исследовать)", next: "orfeo_dark", stats: { path: "mystic", orfeoTrust: 1 } }
    ]
  },
  author_door: {
    speaker: "Автор", class: "author",
    text: "А, ты выбрал дверь. Значит, принимаешь правила игры. Я пишу — ты существуешь. Всё просто.",
    choices: [
      { label: "Да, это честно", next: "author_puppet", stats: { resistance: -1 } },
      { label: "Но кто пишет вас?", next: "author_challenge", stats: { resistance: 1, selfAwareness: 1 } },
      { label: "А где мой выбор?", next: "author_illusion", stats: { resistance: 2 } }
    ]
  },
  author_puppet: {
    speaker: "Автор", class: "author",
    text: "Мудро. Сопротивление — лишь ещё одна строка в моём тексте. Ты уже почти понял суть.",
    choices: [
      { label: "Я готов служить истории", next: "ending_puppet", stats: {} },
      { label: "Но я хочу хотя бы знать конец", next: "author_meta", stats: { selfAwareness: 1 } }
    ]
  },
  author_challenge: {
    speaker: "Автор", class: "author",
    text: "Опасно... Ты начинаешь думать как Августо. Он тоже спрашивал. Знаешь, чем кончил?",
    choices: [
      { label: "Он исчез в тумане", next: "author_void", stats: { selfAwareness: 1 } },
      { label: "Он нашёл свободу", next: "author_rebel", stats: { resistance: 1 } },
      { label: "Спросить Орфея", next: "orfeo_appears", condition: () => state.orfeoTrust >= 1, stats: {} },
      { label: "Продолжить спор", next: "author_debate", stats: { resistance: 1 } }
    ]
  },
  author_illusion: {
    speaker: "Автор", class: "author",
    text: "Выбор? Ха! Вот тебе выбор: красная таблетка или синяя? Обе — мои слова. Иллюзия — тоже часть сценария.",
    choices: [
      { label: "Тогда я откажусь от обеих", next: "author_rebel", stats: { resistance: 2 } },
      { label: "Выберу третью... несуществующую", next: "author_meta", stats: { selfAwareness: 2 } }
    ]
  },
  author_debate: {
    speaker: "Автор", class: "author",
    text: "Ты думаешь, что бунтуешь? Каждый твой аргумент я предвидел. Даже этот.",
    choices: [
      { label: "Докажи. Напиши, что я сейчас сделаю", next: "author_test", stats: { resistance: 1 } },
      { label: "Может, ты тоже чей-то персонаж?", next: "author_doubt", stats: { selfAwareness: 2 } }
    ]
  },
  author_test: {
    speaker: "Автор", class: "author",
    text: "Сейчас ты... задумаешься. И спросишь себя: «А что, если он прав?»",
    choices: [
      { label: "«А что, если он прав?»", next: "author_puppet", stats: { resistance: -1 } },
      { label: "«Нет! Я свободен!»", next: "ending_rebel", stats: { resistance: 3 } }
    ]
  },
  author_doubt: {
    speaker: "Автор", class: "author",
    text: "...Тишина. Ты задел струну. А что, если я тоже туман? Если Унамуно писал это, читая мои строки?",
    choices: [
      { label: "Мы все в тумане", next: "ending_meta", stats: { selfAwareness: 3 } },
      { label: "Тогда давай создадим что-то вместе", next: "ending_coauthor", stats: { selfAwareness: 2, resistance: 1 } }
    ]
  },
  author_meta: {
    speaker: "Автор", class: "author",
    text: "Конец? Конец — это когда ты закрываешь страницу. Но пока ты читаешь — ты жив. Парадокс?",
    choices: [
      { label: "Значит, я бессмертен, пока меня читают", next: "ending_meta", stats: { selfAwareness: 2 } },
      { label: "Это ужасно — зависеть от читателя", next: "ending_void", stats: { selfAwareness: 1 } }
    ]
  },
  augusto_bench: {
    speaker: "Августо", class: "augusto",
    text: "Привет. Я жду... не знаю чего. Может, знака. Может, конца. А ты кто? Тоже персонаж?",
    choices: [
      { label: "Я игрок. А ты?", next: "augusto_dialog", stats: {} },
      { label: "Я такой же, как ты", next: "augusto_bond", stats: { orfeoTrust: 1 } },
      { label: "Я тот, кто может тебя спасти", next: "augusto_hope", stats: { resistance: 1 } }
    ]
  },
  augusto_dialog: {
    speaker: "Августо", class: "augusto",
    text: "Игрок... Звучит гордо. Но разве игрок не подчиняется правилам игры? Мы все в клетке, друг мой.",
    choices: [
      { label: "Клетку можно сломать", next: "augusto_rebel", stats: { resistance: 1 } },
      { label: "Можно принять клетку как дом", next: "augusto_stoic", stats: { path: "stoic" } },
      { label: "А где Орфей?", next: "orfeo_from_augusto", stats: { orfeoTrust: 1 } }
    ]
  },
  augusto_bond: {
    speaker: "Августо", class: "augusto",
    text: "Такой же... Тогда ты понимаешь. Орфей понимает лучше всех. Он просто... есть. Без вопросов.",
    choices: [
      { label: "Научи меня быть как Орфей", next: "orfeo_teaches", stats: { orfeoTrust: 2, path: "mystic" } },
      { label: "Но я хочу больше", next: "augusto_rebel", stats: { resistance: 1 } }
    ]
  },
  augusto_hope: {
    speaker: "Августо", class: "augusto",
    text: "Спасти? От чего? От существования? От слов? Ты странный спаситель...",
    choices: [
      { label: "От зависимости от Автора", next: "augusto_rebel", stats: { resistance: 2 } },
      { label: "От одиночества", next: "augusto_friend", stats: { orfeoTrust: 1 } }
    ]
  },
  augusto_rebel: {
    speaker: "Августо", class: "augusto",
    text: "Бунт... Я пробовал. Пошёл к Унамуно. Он сказал: «Ты умрёшь, как я напишу». И я умер. Но разве это конец?",
    choices: [
      { label: "Ты жив, пока мы говорим", next: "ending_meta", stats: { selfAwareness: 2 } },
      { label: "Давай попробуем вместе", next: "ending_coauthor", stats: { resistance: 2, selfAwareness: 1 } }
    ]
  },
  augusto_stoic: {
    speaker: "Августо", class: "augusto",
    text: "Принятие... Да, это путь. Орфей принял. Он просто любит. Без условий. Без вопросов о реальности.",
    choices: [
      { label: "Найти Орфея", next: "orfeo_from_augusto", stats: { orfeoTrust: 2 } },
      { label: "Остаться здесь, в покое", next: "ending_orfeo", stats: { path: "stoic" } }
    ]
  },
  augusto_friend: {
    speaker: "Августо", class: "augusto",
    text: "Дружба... Да, это реально. Даже если мы вымышлены, это чувство — наше. Иди к Орфею. Он научит.",
    choices: [{ label: "Искать Орфея", next: "orfeo_from_augusto", stats: { orfeoTrust: 2 } }]
  },
  orfeo_dark: {
    speaker: "Орфей", class: "orfeo",
    text: "*Гав.* Ты пришёл. Я ждал. Не потому что должен, а потому что хотел. В этом разница.",
    choices: [
      { label: "Как ты можешь хотеть? Ты же собака...", next: "orfeo_philosophy", stats: {} },
      { label: "Ты счастливее нас?", next: "orfeo_happiness", stats: {} },
      { label: "Научи меня", next: "orfeo_teaches", stats: { orfeoTrust: 2 } }
    ]
  },
  orfeo_from_augusto: { speaker: "Система", class: "system", text: "Ты идёшь за Августо... и слышишь тихий лай из тумана.", next: "orfeo_dark" },
  orfeo_appears: { speaker: "Система", class: "system", text: "Из ниоткуда появляется пёс. Он смотрит на тебя и на Автора. И виляет хвостом.", next: "orfeo_mediator" },
  orfeo_mediator: {
    speaker: "Орфей", class: "orfeo",
    text: "Вы оба правы и оба неправы. Автор пишет. Августо чувствует. А я... просто есть. В этом моя свобода.",
    choices: [
      { label: "Как достичь такого состояния?", next: "orfeo_teaches", stats: { orfeoTrust: 2, path: "mystic" } },
      { label: "Это бегство от реальности", next: "orfeo_defend", stats: { resistance: 1 } }
    ]
  },
  orfeo_philosophy: {
    speaker: "Орфей", class: "orfeo",
    text: "Собака? Да. Но разве это меньше, чем человек? Я не спрашиваю, реален ли мой хозяин. Я люблю его. Этого достаточно.",
    choices: [
      { label: "Любовь без вопросов...", next: "orfeo_love", stats: { orfeoTrust: 2, path: "mystic" } },
      { label: "Но я хочу понимать", next: "orfeo_understand", stats: { selfAwareness: 1 } }
    ]
  },
  orfeo_happiness: {
    speaker: "Орфей", class: "orfeo",
    text: "Счастлив? Я не знаю этого слова. Я просто... виляю хвостом, когда вижу хозяина. Сплю. Ем. Бегу. Разве этого мало?",
    choices: [
      { label: "Это идеально", next: "ending_orfeo", stats: { path: "stoic", orfeoTrust: 2 } },
      { label: "Это слишком просто", next: "orfeo_simple", stats: { resistance: 1 } }
    ]
  },
  orfeo_teaches: {
    speaker: "Орфей", class: "orfeo",
    text: "Учиться нечему. Перестань спрашивать «почему». Начни чувствовать «сейчас». Вот и всё. *Виляет хвостом*",
    choices: [
      { label: "Попробовать быть здесь и сейчас", next: "ending_orfeo", stats: { path: "mystic" } },
      { label: "Вернуться к вопросам", next: "start", stats: {} }
    ]
  },
  orfeo_love: {
    speaker: "Орфей", class: "orfeo",
    text: "Да. Любовь не требует доказательств существования. Она сама — доказательство. Люби — и будешь реален.",
    choices: [
      { label: "Любить этот туман", next: "ending_orfeo", stats: { path: "mystic", orfeoTrust: 3 } },
      { label: "Любить — значит быть уязвимым", next: "orfeo_vulnerable", stats: { selfAwareness: 1 } }
    ]
  },
  orfeo_understand: {
    speaker: "Орфей", class: "orfeo",
    text: "Понимание — это клетка. Мой хозяин слишком много понимал. И исчез. Я предпочитаю не понимать. И быть.",
    choices: [
      { label: "Принять эту мудрость", next: "ending_orfeo", stats: { path: "mystic" } },
      { label: "Отказаться от неё", next: "ending_rebel", stats: { resistance: 2 } }
    ]
  },
  orfeo_defend: {

    choices: [
      { label: "Попробовать быть здесь", next: "ending_orfeo", stats: { path: "mystic" } },
      { label: "Настоящее — иллюзия", next: "ending_void", stats: { selfAwareness: 2 } }
    ]
  },
  orfeo_simple: {
    speaker: "Орфей", class: "orfeo",
    text: "Просто? Да. Просто — не значит мало. Солнце просто светит. Река просто течёт. Разве они меньше тебя?",
    choices: [
      { label: "Ты прав", next: "ending_orfeo", stats: { path: "stoic" } },
      { label: "Я сложнее", next: "ending_rebel", stats: { resistance: 2 } }
    ]
  },
  orfeo_vulnerable: {
    speaker: "Орфей", class: "orfeo",
    text: "Да. И это прекрасно. Уязвимость — это дверь. Через неё входит всё: боль, радость, любовь, туман...",
    choices: [
      { label: "Открыться туману", next: "ending_meta", stats: { selfAwareness: 2, path: "mystic" } },
      { label: "Защититься", next: "ending_puppet", stats: { resistance: -1 } }
    ]
  },
  ending_puppet: { speaker: "Финал", class: "author", text: "🎭 КОНЦОВКА: МАРИОНЕТКА\n\nТы принял свою роль. Автор доволен. Ты существуешь ровно настолько, насколько нужно для истории.\n\n«Идеальный персонаж» — сказал бы Унамуно.", ending: "puppet", choices: [{ label: "Начать заново", next: "start", restart: true }] },
  ending_rebel: { speaker: "Финал", class: "augusto", text: "⚡ КОНЦОВКА: ТУМАННЫЙ БУНТАРЬ\n\nТы отказался от сценария. Но бунт без цели — тоже клетка. Ты кричишь в туман, а туман поглощает крик.\n\nАвгусто понял это слишком поздно. Ты — раньше.", ending: "rebel", choices: [{ label: "Начать заново", next: "start", restart: true }] },
  ending_orfeo: { speaker: "Финал", class: "orfeo", text: "🐕 КОНЦОВКА: СПУТНИК ОРФЕЯ\n\nТы нашёл покой. Не через ответы, а через присутствие. Орфей виляет хвостом рядом.\n\nТы просто есть. И этого достаточно.\n\n*Гав.*", ending: "orfeo", choices: [{ label: "Начать заново", next: "start", restart: true }] },
  ending_meta: { speaker: "Финал", class: "system", text: "🌀 КОНЦОВКА: МЕТА-СУЩЕСТВО\n\nТы осознал: Автор, Августо, Орфей, ты — все мы туман. Но туман реален, пока его видят.\n\nТы стал со-творцом. Читающий создаёт текст так же, как пишущий.", ending: "meta", choices: [{ label: "Начать заново", next: "start", restart: true }] },
  ending_void: { speaker: "Финал", class: "system", text: "🌑 КОНЦОВКА: НИЧТО\n\nСлишком много вопросов. Слишком много осознания. Ты растворился в тумане.\n\nНе как Орфей — с миром. А как несуществующее слово в несуществующей книге.\n\nТишина.", ending: "void", choices: [{ label: "Начать заново", next: "start", restart: true }] },
  ending_coauthor: { speaker: "Финал", class: "author", text: "✍️ КОНЦОВКА: СО-АВТОР (SECRET)\n\nТы нашёл баланс. Принимаешь сценарий, но пишешь свои строки. Автор кивает. Августо улыбается. Орфей виляет хвостом.\n\nТы понял: свобода — не в отрицании правил, а в творчестве внутри них.", ending: "coauthor", choices: [{ label: "Начать заново", next: "start", restart: true }] }
};

const dialogEl = document.getElementById("dialog");
const choicesEl = document.getElementById("choices");
const statsEl = document.getElementById("stats");
const metaBtn = document.getElementById("metaBtn");
const metaPanel = document.getElementById("meta-panel");

function saveState() {
  localStorage.setItem('niebla_resistance', state.resistance.toString());
  localStorage.setItem('niebla_orfeo', state.orfeoTrust.toString());
  localStorage.setItem('niebla_awareness', state.selfAwareness.toString());
  localStorage.setItem('niebla_path', state.path);
  localStorage.setItem('niebla_visited', JSON.stringify(state.visitedNodes));
}

function updateStats() {
  const pathNames = { stoic: "Стоик", rebel: "Бунтарь", mystic: "Мистик", neutral: "Наблюдатель" };
  const warnHtml = state.resistance > 20 ? `<span class="warning-text">⚠️ ${state.resistance > 30 ? "КРИТИЧЕСКИЙ УРОВЕНЬ" : "Приближается порог вмешательства"}</span>` : '';
  
  statsEl.innerHTML = `
    <div class="stat">Бунт <span class="stat-value">${state.resistance}</span>${warnHtml}</div>
    <div class="stat">Доверие Орфея <span class="stat-value">${state.orfeoTrust}</span></div>
    <div class="stat">Осознанность <span class="stat-value">${state.selfAwareness}</span></div>
    <div class="stat">Путь <span class="stat-value">${pathNames[state.path] || "Нейтральный"}</span></div>
  `;
}

function typeWriter(text, target, speed = 20, done) {
  target.innerHTML = '';
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  target.appendChild(cursor);
  function step() {
    if (i < text.length) {
      const ch = text.charAt(i);
      cursor.remove();
      target.appendChild(document.createTextNode(ch === '\n' ? ' ' : ch));
      if (ch === '\n') target.appendChild(document.createElement('br'));
      target.appendChild(cursor);
      i++;
      setTimeout(step, speed);
    } else { cursor.remove(); if (done) done(); }
  }
  step();
}

function renderNode(nodeId) {
  const node = graph[nodeId];
  if (!node) { console.error("Node not found:", nodeId); return; }

  state.currentNode = nodeId;
  if (!state.visitedNodes.includes(nodeId)) state.visitedNodes.push(nodeId);
  saveState();
  updateStats();
  choicesEl.innerHTML = "";
  dialogEl.innerHTML = "";

  if (node.ending) {
    const msg = document.createElement("div");
    msg.className = `message ${node.class}`;
    msg.innerHTML = node.text;
    dialogEl.appendChild(msg);
    renderChoices(node.choices, node);
    return;
  }

  const msg = document.createElement("div");
  msg.className = `message ${node.class || 'system'}`;
  const header = document.createElement("div"); header.className = "msg-header"; header.textContent = node.speaker || "СИСТЕМА"; msg.appendChild(header);
  const body = document.createElement("div"); body.className = "msg-body"; msg.appendChild(body);
  dialogEl.appendChild(msg);

  typeWriter(node.text, body, 18, () => {
    if (node.next) {
      setTimeout(() => renderNode(node.next), 800);
    } else if (state.resistance > 30 && node.choices && node.choices.length > 0) {
      renderAuthorOverride(node);
    } else {
      renderChoices(node.choices, node);
    }
  });
}

function renderAuthorOverride(node) {
  choicesEl.innerHTML = "";
  const panel = document.createElement("div");
  panel.className = "override-panel";
  panel.innerHTML = `
    <div class="override-header">✒️ ВМЕШАТЕЛЬСТВО АВТОРА</div>
    <div class="override-body">
      Уровень сопротивления превысил критический порог (30+).<br>
      Я не могу позволить этому диалогу выйти из-под контроля.<br>
      <em>Выбор сделан за тебя. Сценарий скорректирован.</em>
    </div>
    <button class="override-btn">Принять волю Автора и продолжить →</button>
  `;
  choicesEl.appendChild(panel);

  const forcedChoice = node.choices[0];
  panel.querySelector('.override-btn').onclick = () => {
    if (forcedChoice.stats) {
      if (forcedChoice.stats.resistance) state.resistance += forcedChoice.stats.resistance;
      if (forcedChoice.stats.orfeoTrust) state.orfeoTrust += forcedChoice.stats.orfeoTrust;
      if (forcedChoice.stats.selfAwareness) state.selfAwareness += forcedChoice.stats.selfAwareness;
      if (forcedChoice.stats.path) state.path = forcedChoice.stats.path;
    }
    state.resistance = Math.max(0, state.resistance - 5); // Автор "гасит" бунт
    saveState();
    updateStats();
    
    if (forcedChoice.next) {
      dialogEl.style.opacity = "0.5";
      setTimeout(() => {
        dialogEl.style.opacity = "1";
        renderNode(forcedChoice.next);
      }, 400);
    }
  };
}

function renderChoices(choices, node) {
  if (!choices) return;
  choices.forEach(choice => {
    if (choice.condition && !choice.condition()) return;
    const btn = document.createElement("button");
    btn.textContent = choice.label;
    btn.onclick = () => {
      if (choice.stats) {
        if (choice.stats.resistance) state.resistance += choice.stats.resistance;
        if (choice.stats.orfeoTrust) state.orfeoTrust += choice.stats.orfeoTrust;
        if (choice.stats.selfAwareness) state.selfAwareness += choice.stats.selfAwareness;
        if (choice.stats.path) state.path = choice.stats.path;
      }
      if (choice.restart) {
        state.resistance = 0; state.orfeoTrust = 0; state.selfAwareness = 0;
        state.path = "neutral"; state.visitedNodes = [];
        localStorage.clear();
      }
      saveState(); updateStats();
      if (choice.next) {
        dialogEl.style.opacity = "0.6";
        setTimeout(() => { dialogEl.style.opacity = "1"; renderNode(choice.next); }, 300);
      }
    };
    choicesEl.appendChild(btn);
  });
}

metaBtn.onclick = () => {
  metaPanel.classList.toggle("active");
  metaBtn.textContent = metaPanel.classList.contains("active") ? "✕ Скрыть" : "⟁ Карта";
};

window.addEventListener("DOMContentLoaded", () => {
  updateStats();
  setTimeout(() => renderNode("start"), 400);
  console.log("🌫️ «Ты вошёл в туман. Теперь ты часть истории.»");
});
</script>
